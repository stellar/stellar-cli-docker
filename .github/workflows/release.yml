---
name: release

on:
  workflow_dispatch:
    inputs:
      stellar_cli_version:
        description: stellar-cli version to release (e.g. 26.1.0 for a new release, or an existing version like 26.0.0 to refresh its rust pairings)
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    name: prepare release ${{ inputs.stellar_cli_version }}
    runs-on: ubuntu-24.04
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: configure git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: stage builds.json
        id: prepare
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STELLAR_CLI_VERSION: ${{ inputs.stellar_cli_version }}
        run: |
          tag="$(./scripts/release_prepare.py \
            --stellar-cli-version "$STELLAR_CLI_VERSION")"
          echo "release_tag=$tag" >> "$GITHUB_OUTPUT"

      - name: create release branch
        run: |
          git checkout -b "release/${{ steps.prepare.outputs.release_tag }}"

      - name: commit and push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.prepare.outputs.release_tag }}
        run: ./scripts/release_push_branch.py --release-tag "$RELEASE_TAG"

      - name: open pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.stellar_cli_version }}
          RELEASE_TAG: ${{ steps.prepare.outputs.release_tag }}
          ACTOR: ${{ github.actor }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          title="$(./scripts/release_pr_body.py \
            --stellar-cli-version "$VERSION" \
            --release-tag "$RELEASE_TAG" \
            --actor "$ACTOR" \
            --repo "$REPO" \
            --run-url "$RUN_URL" \
            --default-branch "$DEFAULT_BRANCH" \
            --field title)"
          body="$(./scripts/release_pr_body.py \
            --stellar-cli-version "$VERSION" \
            --release-tag "$RELEASE_TAG" \
            --actor "$ACTOR" \
            --repo "$REPO" \
            --run-url "$RUN_URL" \
            --default-branch "$DEFAULT_BRANCH" \
            --field body)"
          gh pr create \
            --base "$DEFAULT_BRANCH" \
            --head "release/${RELEASE_TAG}" \
            --title "$title" \
            --body "$body"

  release-complete:
    if: always()
    needs:
      - prepare
    runs-on: ubuntu-24.04
    steps:
      - name: check upstream jobs
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1

